appId: dev.forja.terminal
productName: Forja

directories:
  output: release
  buildResources: assets/icons

files:
  - dist/**
  - dist-electron/**
  - node_modules/**

extraMetadata:
  main: dist-electron/main.js

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icons/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: assets/icons/
  category: Development
  executableArgs:
    - --ozone-platform-hint=auto

deb:
  artifactName: "forja_${version}_${arch}.${ext}"
