name: Feature Request
description: Suggest a new feature or enhancement for Forja
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea so we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Describe the pain point.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area of Forja does this relate to?
      options:
        - Terminal / PTY
        - UI / Layout
        - File Explorer
        - Settings / Configuration
        - Theme System
        - AI CLI Integration
        - Context System
        - Agent Chat
        - Git Integration
        - Performance
        - Accessibility
        - Build / Packaging
        - Other
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: How important is this feature to you?
      options:
        - Nice to have
        - Important, but I can work around it
        - Critical for my workflow

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: If applicable, add mockups, screenshots from other tools, or examples of how this could look.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, references, or links related to the feature request.
