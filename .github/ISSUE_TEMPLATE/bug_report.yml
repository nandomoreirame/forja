name: Bug Report
description: Report a bug or unexpected behavior in Forja
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Open Forja
        2. Go to '...'
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: If applicable, add screenshots or screen recordings to help explain the problem.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Debian/Ubuntu)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - Windows 10
        - Windows 11
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Forja Version
      description: "Run `Forja > About` or check package.json"
      placeholder: "e.g., 1.7.0"
    validations:
      required: true

  - type: input
    id: electron-version
    attributes:
      label: Electron Version
      description: Shown in the About dialog
      placeholder: "e.g., 32.x"

  - type: dropdown
    id: cli
    attributes:
      label: AI CLI in Use
      description: Which AI CLI were you using when the bug occurred?
      options:
        - Claude Code
        - Gemini CLI
        - OpenAI Codex
        - Terminal (shell)
        - Not applicable
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (DevTools console, terminal output, etc.)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g., specific project structure, config, etc.)
