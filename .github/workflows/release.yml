name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: "stable"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release (draft)
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Forja ${{ steps.version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          body: |
            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (arm64) | `Forja for Claude Code_${{ steps.version.outputs.version }}_aarch64.dmg` |
            | macOS | Intel (x64) | `Forja for Claude Code_${{ steps.version.outputs.version }}_x64.dmg` |
            | Linux | x64 (.deb) | `forja-for-claude-code_${{ steps.version.outputs.version }}_amd64.deb` |
            | Linux | x64 (.rpm) | `forja-for-claude-code-${{ steps.version.outputs.version }}-1.x86_64.rpm` |
            | Linux | x64 (.AppImage) | `forja-for-claude-code_${{ steps.version.outputs.version }}_amd64.AppImage` |

            > **macOS note:** This app is not notarized. Right-click > Open to bypass Gatekeeper on first launch.

  build-tauri:
    name: Build (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            runner: macos-latest
            rust-target: aarch64-apple-darwin
          - label: macOS (Intel)
            runner: macos-latest
            rust-target: x86_64-apple-darwin
          - label: Linux (x64)
            runner: ubuntu-22.04
            rust-target: ""
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.rust-target && format('--target {0}', matrix.rust-target) || '' }}

  publish-release:
    name: Publish Release
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
