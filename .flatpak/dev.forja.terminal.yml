app-id: dev.forja.terminal
runtime: org.gnome.Platform
runtime-version: "46"
sdk: org.gnome.Sdk
command: forja

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --filesystem=home
  - --device=dri

modules:
  - name: forja-terminal
    buildsystem: simple
    build-commands:
      - ar x forja.deb
      - tar xf data.tar.*
      - cp -a opt/Forja /app/forja
      - mkdir -p /app/bin /app/share/applications /app/share/metainfo
      - ln -s /app/forja/@forjaapp /app/bin/forja
      - cp -r usr/share/icons /app/share/icons || true
      - install -Dm644 usr/share/icons/hicolor/128x128/apps/@forjaapp.png
        /app/share/icons/hicolor/128x128/apps/dev.forja.terminal.png || true
      - install -Dm644 dev.forja.terminal.metainfo.xml
        /app/share/metainfo/dev.forja.terminal.metainfo.xml
      - |
        cat > /app/share/applications/dev.forja.terminal.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=Forja
        Comment=A dedicated desktop client for vibe coders
        Exec=forja
        Icon=dev.forja.terminal
        Terminal=false
        Type=Application
        Categories=Development;IDE;
        DESKTOP
    sources:
      - type: file
        url: https://github.com/OWNER/forja-terminal/releases/download/vVERSION/forja_VERSION_amd64.deb
        sha256: PLACEHOLDER_SHA256
        dest-filename: forja.deb
      - type: file
        path: dev.forja.terminal.metainfo.xml
